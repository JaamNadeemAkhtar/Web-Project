<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | TripWallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="auth-body">


    <div class="login-card reveal">
        <a href="index.html" class="logo">
            <i data-lucide="wallet"></i>
            TripWallet
        </a>
        <h2>Create Account</h2>
        <p style="color: var(--muted);">Join 100,000+ travelers today.</p>

        <form style="margin-top: 2rem;">
            <div class="input-row">
                <div class="input-group" style="text-align: left;">
                    <label>First Name</label>
                    <input type="text" placeholder="John">
                </div>
                <div class="input-group" style="text-align: left;">
                    <label>Last Name</label>
                    <input type="text" placeholder="Doe">
                </div>
            </div>
            <div class="input-group" style="text-align: left;">
                <label>Email Address</label>
                <input type="email" placeholder="name@company.com">
            </div>
            <div class="input-group" style="text-align: left;">
                <label>Password</label>
                <input type="password" placeholder="••••••••">
            </div>
            <div style="display: flex; align-items: flex-start; gap: 0.75rem; text-align: left; margin: 1.5rem 0;">
                <input type="checkbox" style="width: auto; margin-top: 4px;">
                <label style="font-size: 0.85rem; color: var(--muted);">I agree to the <a href="#" style="color: var(--primary);">Terms of Service</a> and <a href="#" style="color: var(--primary);">Privacy Policy</a>.</label>
            </div>
            <button class="btn btn-primary" style="width: 100%;">Create My Account</button>
        </form>

        <p style="margin-top: 2rem; color: var(--muted); font-size: 0.9rem;">
            Already have an account? <a href="login.html" style="color: var(--primary); font-weight: 600;">Sign in</a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
    <script src="script.js"></script>
</body>
</html>
